{% extends 'base.html' %}

{% block title %}Модерация - Админ-панель{% endblock %}

{% block content %}
<div class="admin-header">
    <h2>🛡️ Модерация через сайт</h2>
    <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">← Назад</a>
</div>

<div class="moderation-section">
    <h3>Выберите сервер</h3>
    <select id="guildSelect" class="form-select" onchange="loadGuildInfo()">
        <option value="">-- Выберите сервер --</option>
        {% for guild in guilds %}
        <option value="{{ guild.guild_id }}">{{ guild.guild_id }}</option>
        {% endfor %}
    </select>
</div>

<div id="moderationPanel" style="display: none;">
    <div class="moderation-grid">
        <div class="mod-card">
            <h4>⛔ Бан</h4>
            <form onsubmit="performModeration('ban', event)">
                <input type="text" name="user_id" placeholder="ID пользователя" required>
                <input type="text" name="reason" placeholder="Причина">
                <button type="submit" class="btn btn-danger">Забанить</button>
            </form>
        </div>

        <div class="mod-card">
            <h4>👢 Кик</h4>
            <form onsubmit="performModeration('kick', event)">
                <input type="text" name="user_id" placeholder="ID пользователя" required>
                <input type="text" name="reason" placeholder="Причина">
                <button type="submit" class="btn btn-warning">Кикнуть</button>
            </form>
        </div>

        <div class="mod-card">
            <h4>🔇 Мут</h4>
            <form onsubmit="performModeration('mute', event)">
                <input type="text" name="user_id" placeholder="ID пользователя" required>
                <input type="number" name="duration" placeholder="Минуты">
                <input type="text" name="reason" placeholder="Причина">
                <button type="submit" class="btn btn-info">Замутить</button>
            </form>
        </div>

        <div class="mod-card">
            <h4>🎭 Выдать роль</h4>
            <form onsubmit="performModeration('give_role', event)">
                <input type="text" name="user_id" placeholder="ID пользователя" required>
                <input type="text" name="role_id" placeholder="ID роли" required>
                <button type="submit" class="btn btn-success">Выдать</button>
            </form>
        </div>
    </div>
</div>

<div id="moderationLog" class="moderation-log">
    <h3>📋 Журнал действий</h3>
    <div id="logEntries"></div>
</div>

<script>
let currentGuildId = null;

function loadGuildInfo() {
    const select = document.getElementById('guildSelect');
    currentGuildId = select.value;
    
    if (currentGuildId) {
        document.getElementById('moderationPanel').style.display = 'block';
        addLogEntry(`Выбран сервер: ${currentGuildId}`);
    } else {
        document.getElementById('moderationPanel').style.display = 'none';
    }
}

function performModeration(action, event) {
    event.preventDefault();
    const form = event.target;
    const formData = new FormData(form);
    
    const data = {
        action: action,
        guild_id: currentGuildId,
        user_id: formData.get('user_id'),
        reason: formData.get('reason') || 'Не указана',
        duration: formData.get('duration')
    };
    
    // В реальном проекте здесь будет fetch запрос к API
    addLogEntry(`[${action.toUpperCase()}] Пользователь ${data.user_id} | Причина: ${data.reason}`);
    
    // Очистка формы
    form.reset();
    
    // Показываем уведомление
    showNotification('Действие выполнено!', 'success');
}

function addLogEntry(message) {
    const logDiv = document.getElementById('logEntries');
    const entry = document.createElement('div');
    entry.className = 'log-entry';
    entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
    logDiv.insertBefore(entry, logDiv.firstChild);
    
    // Ограничиваем количество записей
    while (logDiv.children.length > 50) {
        logDiv.removeChild(logDiv.lastChild);
    }
}

function showNotification(message, type) {
    // Простая реализация уведомлений
    const notification = document.createElement('div');
    notification.className = `notification notification-${type}`;
    notification.textContent = message;
    document.body.appendChild(notification);
    
    setTimeout(() => notification.remove(), 3000);
}
</script>

<style>
.moderation-section {
    background: rgba(255, 255, 255, 0.05);
    padding: 30px;
    border-radius: 10px;
    margin-bottom: 30px;
}

.moderation-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    margin-top: 20px;
}

.mod-card {
    background: rgba(255, 255, 255, 0.05);
    padding: 20px;
    border-radius: 10px;
    border: 1px solid rgba(255, 255, 255, 0.1);
}

.mod-card h4 {
    color: #00d9ff;
    margin-bottom: 15px;
}

.mod-card form {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.mod-card input {
    padding: 10px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 5px;
    background: rgba(255, 255, 255, 0.1);
    color: #fff;
}

.mod-card input:focus {
    outline: none;
    border-color: #00d9ff;
}

.btn-danger {
    background: #ff0055;
    color: #fff;
}

.btn-warning {
    background: #ffaa00;
    color: #1a1a2e;
}

.btn-info {
    background: #00d9ff;
    color: #1a1a2e;
}

.btn-success {
    background: #00ff88;
    color: #1a1a2e;
}

.moderation-log {
    background: rgba(255, 255, 255, 0.05);
    padding: 30px;
    border-radius: 10px;
    margin-top: 30px;
    max-height: 400px;
    overflow-y: auto;
}

.log-entry {
    padding: 10px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    font-family: monospace;
    font-size: 0.9rem;
}

.form-select {
    width: 100%;
    padding: 12px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 5px;
    background: rgba(255, 255, 255, 0.1);
    color: #fff;
    font-size: 1rem;
}

.form-select:focus {
    outline: none;
    border-color: #00d9ff;
}

.notification {
    position: fixed;
    top: 20px;
    right: 20px;
    padding: 15px 25px;
    border-radius: 5px;
    color: #fff;
    font-weight: bold;
    z-index: 1000;
    animation: slideIn 0.3s ease;
}

.notification-success {
    background: #00ff88;
    color: #1a1a2e;
}

.notification-error {
    background: #ff0055;
}

@keyframes slideIn {
    from {
        transform: translateX(100%);
        opacity: 0;
    }
    to {
        transform: translateX(0);
        opacity: 1;
    }
}
</style>
{% endblock %}
