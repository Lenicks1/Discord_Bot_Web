{% extends 'base.html' %}

{% block title %}Логи - Админ-панель{% endblock %}

{% block content %}
<div class="admin-header">
    <h2>📋 Логи в реальном времени</h2>
    <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">← Назад</a>
    <button id="clearLogs" class="btn btn-danger">🗑️ Очистить</button>
</div>

<div class="logs-container">
    <div class="log-filters">
        <label>
            <input type="checkbox" id="filter-info" checked> INFO
        </label>
        <label>
            <input type="checkbox" id="filter-warning" checked> WARNING
        </label>
        <label>
            <input type="checkbox" id="filter-error" checked> ERROR
        </label>
        <label>
            <input type="checkbox" id="filter-critical" checked> CRITICAL
        </label>
    </div>
    
    <div id="logEntries" class="log-entries"></div>
</div>

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
<script>
const socket = io();
const logEntries = document.getElementById('logEntries');
const maxLogs = 100;

socket.on('connect', () => {
    addLogEntry('SYSTEM', 'Подключено к серверу логов', 'info');
});

socket.on('log', (data) => {
    addLogEntry(data.level, data.message, data.level.toLowerCase());
});

function addLogEntry(level, message, type) {
    const entry = document.createElement('div');
    entry.className = `log-entry log-${type}`;
    entry.innerHTML = `
        <span class="log-time">${new Date().toLocaleTimeString()}</span>
        <span class="log-level">[${level}]</span>
        <span class="log-message">${message}</span>
    `;
    
    logEntries.insertBefore(entry, logEntries.firstChild);
    
    // Ограничиваем количество записей
    while (logEntries.children.length > maxLogs) {
        logEntries.removeChild(logEntries.lastChild);
    }
}

document.getElementById('clearLogs').addEventListener('click', () => {
    logEntries.innerHTML = '';
});

// Фильтры
document.querySelectorAll('.log-filters input').forEach(checkbox => {
    checkbox.addEventListener('change', updateLogFilters);
});

function updateLogFilters() {
    const filters = {
        info: document.getElementById('filter-info').checked,
        warning: document.getElementById('filter-warning').checked,
        error: document.getElementById('filter-error').checked,
        critical: document.getElementById('filter-critical').checked
    };
    
    document.querySelectorAll('.log-entry').forEach(entry => {
        const type = entry.classList.contains('log-info') ? 'info' :
                    entry.classList.contains('log-warning') ? 'warning' :
                    entry.classList.contains('log-error') ? 'error' : 'critical';
        entry.style.display = filters[type] ? 'block' : 'none';
    });
}
</script>

<style>
.logs-container {
    background: rgba(255, 255, 255, 0.05);
    border-radius: 10px;
    padding: 20px;
    margin-top: 20px;
}

.log-filters {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
    flex-wrap: wrap;
}

.log-filters label {
    display: flex;
    align-items: center;
    gap: 5px;
    cursor: pointer;
}

.log-entries {
    max-height: 600px;
    overflow-y: auto;
    font-family: 'Consolas', 'Monaco', monospace;
    font-size: 0.9rem;
}

.log-entry {
    padding: 8px 12px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    display: flex;
    gap: 15px;
    animation: slideIn 0.3s ease;
}

.log-time {
    color: #666;
    min-width: 80px;
}

.log-level {
    min-width: 80px;
    font-weight: bold;
}

.log-message {
    flex: 1;
    word-break: break-word;
}

.log-info { background: rgba(0, 217, 255, 0.1); }
.log-warning { background: rgba(255, 170, 0, 0.1); }
.log-error { background: rgba(255, 0, 85, 0.1); }
.log-critical { background: rgba(255, 0, 0, 0.2); }

.log-info .log-level { color: #00d9ff; }
.log-warning .log-level { color: #ffaa00; }
.log-error .log-level { color: #ff0055; }
.log-critical .log-level { color: #ff0000; }

@keyframes slideIn {
    from {
        transform: translateX(-20px);
        opacity: 0;
    }
    to {
        transform: translateX(0);
        opacity: 1;
    }
}
</style>
{% endblock %}
